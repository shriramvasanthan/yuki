<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — Yuki</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Cinzel:wght@400;600;900&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav id="navbar">
  <div class="nav-logo-text"><a href="index.html"><span class="logo-yuki">Yuki</span></a><span class="logo-tagline">Natural · Organic · Pure</span></div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="products.html">Products</a></li>
    <li><a href="about.html">About</a></li>
  </ul>
  <div class="nav-actions">
    <a href="cart.html" class="nav-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <span class="cart-badge" id="cart-badge">0</span>
    </a>
    <div id="nav-auth"><a href="login.html" class="btn-nav-login">Login</a></div>
    <div id="nav-user"><span id="nav-username" class="nav-username"></span><button class="btn-nav-logout" id="logout-btn">Logout</button></div>
  </div>
  <button class="nav-mobile-toggle" id="mobile-toggle">&#9776;</button>
</nav>
<div class="mobile-menu" id="mobile-menu">
  <a href="index.html">Home</a>
  <a href="products.html">Products</a>
  <a href="about.html">About</a>
  <a href="cart.html">Cart</a>
  <a href="login.html" id="mobile-login">Login</a>
  <a href="#" id="mobile-logout" style="display:none">Logout</a>
</div>

<main class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-yuki">Yuki</span>
      <p>Natural · Organic · Pure</p>
    </div>
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-sub">Join the Yuki wellness community</p>

    <div class="auth-error" id="error-box"></div>
    <div class="auth-success" id="success-box"></div>

    <button class="btn-google" id="google-btn">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign up with Google
    </button>

    <div class="auth-divider"><span>or</span></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" class="form-control" id="name" placeholder="Your full name" autocomplete="name">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" class="form-control" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" class="form-control" id="password" placeholder="At least 6 characters" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" class="form-control" id="confirm-password" placeholder="Repeat your password" autocomplete="new-password">
    </div>

    <button class="btn-primary btn-full" id="signup-btn">Create Account</button>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</main>

<script type="module">
import { auth, db } from "./firebase-config.js";
import {
  createUserWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup,
  updateProfile,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { initAuth } from "./auth.js";
import { updateCartBadge } from "./cart-utils.js";

initAuth();
updateCartBadge();

// Redirect if already logged in
onAuthStateChanged(auth, user => {
  if (user) window.location.replace("index.html");
});

const errorBox   = document.getElementById("error-box");
const AUTH_ERRORS = {
  "auth/email-already-in-use": "An account with this email already exists.",
  "auth/invalid-email":        "Invalid email address.",
  "auth/weak-password":        "Password is too weak (minimum 6 characters)."
};

function showError(msg) { errorBox.textContent = msg; errorBox.style.display = "block"; }
function clearError()   { errorBox.style.display = "none"; }

// Save user record to Firestore
async function saveUser(user, name) {
  try {
    await setDoc(doc(db, "users", user.uid), {
      uid:       user.uid,
      name:      name || user.displayName || "",
      email:     user.email,
      role:      "customer",
      createdAt: serverTimestamp()
    }, { merge: true });
  } catch (e) {
    console.warn("Could not save user to Firestore:", e.message);
  }
}

// Email / Password signup
document.getElementById("signup-btn").addEventListener("click", async () => {
  clearError();
  const name    = document.getElementById("name").value.trim();
  const email   = document.getElementById("email").value.trim();
  const pass    = document.getElementById("password").value;
  const confirm = document.getElementById("confirm-password").value;

  if (!name)              { showError("Please enter your full name."); return; }
  if (!email)             { showError("Please enter your email address."); return; }
  if (!pass)              { showError("Please choose a password."); return; }
  if (pass.length < 6)    { showError("Password must be at least 6 characters."); return; }
  if (pass !== confirm)   { showError("Passwords do not match."); return; }

  const btn = document.getElementById("signup-btn");
  btn.textContent = "Creating account\u2026"; btn.disabled = true;

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    await saveUser(cred.user, name);
    window.location.replace("index.html");
  } catch (e) {
    showError(AUTH_ERRORS[e.code] || e.message);
    btn.textContent = "Create Account"; btn.disabled = false;
  }
});

// Google signup
document.getElementById("google-btn").addEventListener("click", async () => {
  clearError();
  try {
    const provider = new GoogleAuthProvider();
    const cred = await signInWithPopup(auth, provider);
    await saveUser(cred.user, cred.user.displayName);
    window.location.replace("index.html");
  } catch (e) {
    if (e.code !== "auth/popup-closed-by-user") showError(e.message);
  }
});
</script>
</body>
</html>
